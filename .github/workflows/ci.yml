name: CI

on:
  push:
    branches: [main, korean]
    tags-ignore: ['**']
  pull_request:

jobs:
  test:
    name: Offline tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Font header structural checks
        run: python3 tests/check_fonts.py

      - name: Language table checks (UTF-8 / parity / width budgets)
        run: python3 tests/check_lang.py

      - name: Host renderer tests (ASan/UBSan)
        run: |
          command -v clang >/dev/null 2>&1 || { sudo apt-get update && sudo apt-get install -y clang; }
          make -C tests/host test CC=clang

      - name: link_kernel.py self-test
        run: bash scripts/selftest_link_kernel.sh

  build:
    name: GBA kernel build (devkitARM)
    needs: test
    runs-on: ubuntu-latest
    # devkitPro publishes no long-term stable version tag for this image;
    # `latest` is the supported tag (rolling toolchain snapshots). Pin by
    # digest here if a bit-reproducible toolchain is ever required.
    container: devkitpro/devkitarm:latest
    env:
      DEVKITPRO: /opt/devkitpro
      DEVKITARM: /opt/devkitpro/devkitARM
    steps:
      - uses: actions/checkout@v4

      - name: Ensure python3 in container
        # The devkitpro/devkitarm image is Debian-based but may not ship
        # python3; tools/gen_version.py needs it before `make` because
        # source/version.h is compiled into the kernel.
        run: |
          if ! command -v python3 >/dev/null 2>&1; then
            apt-get update
            apt-get install -y --no-install-recommends python3
          fi
          python3 --version

      - name: Stamp version (source/version.h before make)
        run: |
          python3 tools/gen_version.py
          echo "resolved version: $(python3 tools/gen_version.py --check)"

      - name: Build kernel (.gba)
        run: |
          export PATH="$DEVKITPRO/tools/bin:$DEVKITARM/bin:$PATH"
          make
          ls -l *.gba

      - name: Kernel size guard (1 MiB hard limit)
        run: |
          GBA=$(ls *.gba | head -n1)
          SIZE=$(stat -c %s "$GBA")
          echo "$GBA: $SIZE bytes (limit 1048576)"
          if [ "$SIZE" -gt 1048576 ]; then
            echo "FAIL: kernel exceeds the 0x100000 (1 MiB) hard limit"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: kernel-gba
          path: '*.gba'
          if-no-files-found: error

  package:
    name: Link ezairkernel.bin
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - uses: actions/download-artifact@v4
        with:
          name: kernel-gba

      - name: Link kernel + image.bin
        run: |
          GBA=$(ls *.gba | head -n1)
          python3 tools/link_kernel.py "$GBA" image.bin -o ezairkernel.bin

      - name: Verify artifact sizes
        run: |
          GBA=$(ls *.gba | head -n1)
          GBA_SIZE=$(stat -c %s "$GBA")
          BIN_SIZE=$(stat -c %s ezairkernel.bin)
          echo "$GBA: $GBA_SIZE bytes; ezairkernel.bin: $BIN_SIZE bytes"
          [ "$GBA_SIZE" -le 1048576 ] || { echo "FAIL: kernel > 1 MiB"; exit 1; }
          [ "$BIN_SIZE" -eq 2123424 ] || { echo "FAIL: ezairkernel.bin != 2123424 bytes"; exit 1; }

      - name: Short SHA
        id: meta
        run: echo "short=${GITHUB_SHA:0:8}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: air-kernel-ko-${{ steps.meta.outputs.short }}
          path: |
            *.gba
            ezairkernel.bin
          if-no-files-found: error
